<!-- ═══════════════════════════════════════════════════════════════
     AP2 IDB Bridge — all data served from IndexedDB via AdminPro
     ═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Constants used by child pages ── */
window.AP2_VS_ROWS  = 20;

/* ══ AP2Cache — thin IDB-backed API (wraps AdminPro._cache) ══
   All reads/writes go through IndexedDB via dataLayer.js.
   No in-memory store, no static data, no shadow Maps.          */
window.AP2Cache = {
  async set(key, data) {
    if (window.AdminPro) AdminPro.cache.set(key, data);
  },
  async get(key) {
    return window.AdminPro ? AdminPro.cache.get(key) : null;
  },
  async getData(key) {
    const e = window.AdminPro ? AdminPro.cache.get(key) : null;
    return e ? e.data : null;
  },
  async getTs(key) {
    const e = window.AdminPro ? AdminPro.cache.get(key) : null;
    return e ? e.ts : null;
  },
  async getAge(key) {
    const e = window.AdminPro ? AdminPro.cache.get(key) : null;
    return e ? Date.now() - e.ts : Infinity;
  },
  async delete(key) {
    if (window.AdminPro) AdminPro.cache.clear(key);
  },
  async clearAll() {
    if (window.AdminPro) AdminPro.cache.clearAll();
  },
  async keys() {
    return window.AdminPro ? Object.keys(AdminPro.getActiveDatasets()) : [];
  },
  /* Stream-query directly from IDB — row-by-row filter, no full clone */
  async streamQuery(key, predicateFn) {
    if (window.AdminPro) return AdminPro.streamQuery(key, predicateFn);
    return [];
  },
  async count(key) {
    const e = window.AdminPro ? AdminPro.cache.get(key) : null;
    return e && Array.isArray(e.data) ? e.data.length : 0;
  },
  onChange(_fn) { /* no-op — IDB writes are observed via AdminPro */ },
};

/* ══ _AP2Shadow — thin Map-like proxy over AdminPro.cache ══
   Lets legacy call sites keep using .age.get/.set/.delete/.clear/.entries()
   and .data.get/.set/.delete/.clear/.entries() without maintaining a
   separate in-memory copy. Reads always reflect AdminPro.cache (IDB-backed);
   writes/deletes are routed back into AdminPro.cache so both "maps" stay
   in sync automatically. */
(function () {
  function activeEntries(pick) {
    if (!window.AdminPro || typeof AdminPro.getActiveDatasets !== 'function') return [];
    const out = [];
    for (const key of Object.keys(AdminPro.getActiveDatasets())) {
      const e = AdminPro.cache.get(key);
      if (e) out.push([key, pick(e)]);
    }
    return out;
  }

  const dataShadow = {
    get(key) {
      const e = window.AdminPro ? AdminPro.cache.get(key) : null;
      return e ? e.data : undefined;
    },
    set(_key, _value) { /* no-op — AdminPro.cache is already the source of truth */ },
    has(key) {
      const e = window.AdminPro ? AdminPro.cache.get(key) : null;
      return !!(e && e.data !== undefined && e.data !== null);
    },
    delete(key) {
      if (window.AdminPro) AdminPro.cache.clear(key);
      return true;
    },
    clear() {
      if (window.AdminPro) AdminPro.cache.clearAll();
    },
    entries() {
      return activeEntries(e => e.data).filter(([, d]) => d != null)[Symbol.iterator]();
    },
    keys() {
      return activeEntries(e => e.data).filter(([, d]) => d != null).map(([k]) => k)[Symbol.iterator]();
    },
  };

  const ageShadow = {
    get(key) {
      const e = window.AdminPro ? AdminPro.cache.get(key) : null;
      return e ? e.ts : undefined;
    },
    set(_key, _ts) { /* no-op — AdminPro.cache is already the source of truth */ },
    has(key) {
      const e = window.AdminPro ? AdminPro.cache.get(key) : null;
      return !!e;
    },
    delete(key) {
      if (window.AdminPro) AdminPro.cache.clear(key);
      return true;
    },
    clear() {
      if (window.AdminPro) AdminPro.cache.clearAll();
    },
    entries() {
      return activeEntries(e => e.ts)[Symbol.iterator]();
    },
    keys() {
      return activeEntries(e => e.ts).map(([k]) => k)[Symbol.iterator]();
    },
  };

  window._AP2Shadow = { data: dataShadow, age: ageShadow };
})();

console.log('[AP2] IDB bridge ready — all data served from IndexedDB via AdminPro');
</script>

 html,body{

.shell{
  display:flex;
  flex-direction:column;
  height:100dvh;
  width:100%;
  inset:0; 
}
	

/* ═══ TOPBAR ═══ */
.topbar{
  height:var(--topbar-h);
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;
  flex-shrink:0;position:relative;
  /* topbar must be above the dropdown — z-index:300 so dropdown (z:9999 fixed) still clears */
  z-index:300;width:100%;
  overflow:visible; /* allow dropdown to escape */
}
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--purple) 40%,var(--teal) 100%);
  opacity:.75;pointer-events:none;
}

/* ── Brand zone ── */
.tb-brand{
  width:var(--icon-bar-w);
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(160deg,rgba(88,166,255,.06) 0%,transparent 100%);
}
.tb-brand-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent) 0%,#1f6feb 100%);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;
  box-shadow:0 0 14px var(--accent-glow),0 2px 4px rgba(0,0,0,.3);
  transition:box-shadow .2s,transform .15s;
  cursor:pointer;border:none;
}
.tb-brand-icon:hover{box-shadow:0 0 22px var(--accent-glow),0 2px 8px rgba(0,0,0,.4);transform:scale(1.05);}
.tb-brand-icon:active{transform:scale(.96);}

/* ── App name zone ── */
.tb-app{
  width:var(--sub-bar-w);
  border-right:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;flex-shrink:0;
  min-width:0;overflow:hidden;
  transition:width .25s cubic-bezier(.4,0,.2,1),padding .25s,border .25s;
}
.tb-app.collapsed{width:0;padding:0;border-right-color:transparent;}
.tb-app-name{font-size:12.5px;font-weight:700;color:var(--text);letter-spacing:-.015em;line-height:1.2;white-space:nowrap;}
.tb-app-sub{font-size:9.5px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-top:2px;white-space:nowrap;}

.tb-daynight{
  margin-left:auto;flex-shrink:0;
  height:24px;width:24px;padding:0;
  border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
  font-family:var(--font);font-weight:600;
}
.tb-daynight i{font-size:15px;transition:color .2s,transform .3s;}
.tb-daynight:hover{background:transparent;color:var(--text);}
.tb-daynight:hover i{transform:rotate(20deg);}
/* ── Main strip ── */
.tb-strip{
  flex:1;display:flex;align-items:center;
  padding:0 10px;gap:5px;min-width:0;
  /* allow overflow visible so dropdown can show above everything */
  overflow:visible;
}

/* page context — hide on small screens */
.tb-page-ctx{
  display:flex;align-items:center;gap:8px;
  padding-right:12px;
  border-right:1px solid var(--border);
  flex-shrink:0;
}
.tb-page-pill{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.tb-page-label{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;}
.tb-page-sub2{font-size:10px;color:var(--text3);margin-top:1px;}

/* shortcuts — always visible, scrollable if needed */
.tb-shortcuts{
  display:flex;align-items:center;gap:4px;
  padding:0 8px;
  border-right:1px solid var(--border);
  flex-shrink:0;
  /* scrollable when items overflow */
  overflow-x:auto;overflow-y:hidden;
  max-width:560px;
  scrollbar-width:none;
}
.tb-shortcuts::-webkit-scrollbar{display:none;}
.tb-sc{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 9px;height:28px;
  border-radius:6px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  font-size:11px;font-weight:500;cursor:pointer;
  font-family:var(--font);transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.tb-sc i{font-size:13px;flex-shrink:0;}
.tb-sc:hover{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.tb-sc.emp{color:var(--accent);border-color:rgba(88,166,255,.3);background:var(--accent-dim);}
.tb-sc.emp:hover{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent-glow);}
.tb-sc.bike{color:var(--teal);border-color:rgba(57,211,83,.3);background:var(--teal-dim);}
.tb-sc.bike:hover{background:var(--teal);color:#fff;}
.tb-sc.adv{color:var(--amber);border-color:rgba(227,179,65,.3);background:var(--amber-dim);}
.tb-sc.adv:hover{background:var(--amber);color:#0d1117;}
.tb-sc.doc{color:var(--red);border-color:rgba(248,81,73,.3);background:var(--red-dim);}
.tb-sc.doc:hover{background:var(--red);color:#fff;}

.tb-gap{flex:1;min-width:4px;}


/* ══ THEME DROPDOWN ══
   The button sits inside .topbar (z:300).
   The dropdown is position:fixed so it always renders on top of everything. */
.theme-dd-wrap{position:relative;flex-shrink:0;}

.tb-theme-btn{
  display:flex;align-items:center;gap:6px;
  padding:0 11px;height:28px;
  border-radius:6px;
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--text);
  font-size:11.5px;font-weight:600;cursor:pointer;
  font-family:var(--font);transition:all .15s;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.tb-theme-btn i.icon-main{font-size:14px;color:var(--accent);}
.tb-theme-btn .caret{font-size:10px;color:var(--text3);transition:transform .2s;margin-left:1px;}
.tb-theme-btn:hover{background:var(--surface2);border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow);}
.tb-theme-btn.open{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 10px var(--accent-glow);}
.tb-theme-btn.open .caret{transform:rotate(180deg);}

/* Dropdown — position:fixed so it always renders above all siblings */
.theme-dropdown{
  position:fixed;
  /* JS sets top/right at open time */
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:10px;padding:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);
  z-index:99999;
  min-width:175px;
  display:none;
  animation:ddIn .15s ease;
}
.theme-dropdown.open{display:block;}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

.td-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text3);
  padding:4px 10px 5px;
}
.td-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 10px;border-radius:7px;
  cursor:pointer;font-size:12px;color:var(--text2);
  transition:all .12s;
  border:1px solid transparent;
  font-family:var(--font);background:none;width:100%;text-align:left;
}
.td-item:hover{background:var(--surface2);color:var(--text);}
.td-item.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(88,166,255,.25);font-weight:600;}
.td-swatch{
  width:13px;height:13px;border-radius:50%;
  flex-shrink:0;border:1.5px solid rgba(255,255,255,.2);
}
.td-item i{font-size:13px;flex-shrink:0;width:15px;text-align:center;}

/* sep */
.tb-vsep{width:1px;height:18px;background:var(--border);flex-shrink:0;}

/* user chip */
.tb-user{
  display:flex;align-items:center;gap:7px;
  padding:0 10px;height:28px;
  border-radius:6px;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.tb-user:hover{background:var(--surface2);border-color:var(--border2);}
.tb-avatar{
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),#6e40c9);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:8.5px;font-weight:700;flex-shrink:0;
}
.tb-uname{font-size:11px;font-weight:600;color:var(--text);line-height:1.1;}
.tb-urole{font-size:9px;color:var(--text3);}

/* ═══ BODY ROW ═══ */
.body-row{flex:1;display:flex;overflow:hidden;min-height:0;}

/* ─── ICON BAR ─── 
   Always visible, never hidden, scrollable when items overflow */
#icon-bar{
  width:var(--icon-bar-w);
  min-width:var(--icon-bar-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;gap:3px;
  flex-shrink:0;z-index:110;position:relative;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
#icon-bar::-webkit-scrollbar{display:none;}
#icon-bar::after{
  content:'';position:absolute;top:0;right:-1px;
  width:1px;height:100%;
  background:linear-gradient(to bottom,var(--accent-glow),transparent 55%);
  pointer-events:none;
}
.ib-divider{width:26px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;}
.ib-spacer{flex:1;}
.ib-btn{
  position:relative;width:36px;height:36px;
  border-radius:var(--radius);border:none;
  background:transparent;color:var(--text2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:background .15s,color .15s;flex-shrink:0;
}
.ib-btn:hover{background:var(--surface);color:var(--text);}
.ib-btn.active{background:var(--accent-dim);color:var(--accent);}
.ib-tip{
  position:absolute;left:calc(100% + 10px);top:50%;
  transform:translateY(-50%);
  background:var(--surface2);color:var(--text);
  font-size:11px;padding:4px 9px;border-radius:6px;
  white-space:nowrap;pointer-events:none;opacity:0;
  transition:opacity .15s;border:1px solid var(--border2);
  z-index:400;font-family:var(--font);
}
.ib-btn:hover .ib-tip{opacity:1;}

/* icon-bar adaptive: smaller icons when very tight */
@media(max-height:400px){
  .ib-btn{width:30px;height:30px;font-size:15px;}
  #icon-bar{padding:4px 0;gap:1px;}
}

/* ─── SUB BAR ─── */
#sub-bar{
  width:var(--sub-bar-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  flex-shrink:0;overflow:hidden;
  transition:width .25s cubic-bezier(.4,0,.2,1);z-index:100;
}
#sub-bar.collapsed{width:0;}
.sb2-header{
  padding:12px 14px 8px;
  font-size:9.5px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border);flex-shrink:0;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.sb2-header i{font-size:13px;color:var(--accent);}
.sb2-nav{flex:1;overflow-y:auto;padding:6px;}
.sb2-nav::-webkit-scrollbar{width:3px;}
.sb2-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.sb2-section{
  font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);
  padding:8px 10px 3px;
}
.sb2-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--radius);
  cursor:pointer;font-size:12px;color:var(--text2);
  transition:all .15s;user-select:none;white-space:nowrap;
  border:1px solid transparent;margin-bottom:2px;
}
.sb2-item i{font-size:14px;flex-shrink:0;}
.sb2-item:hover{background:var(--surface);color:var(--text);border-color:var(--border);}
.sb2-item.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(88,166,255,.2);font-weight:500;}
.sb2-badge{
  margin-left:auto;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:10px;
  background:var(--red-dim);color:var(--red);
}
#sub-bar.subitems-hiding .sb2-item{
  animation:subOut .45s ease forwards;
}
@keyframes subOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(-10px);}}

/* ─── MAIN AREA ─── */
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.main-container{
  flex:1;margin:5px;overflow:hidden;
  display:flex;flex-direction:column;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg);min-height:0;
}
#main-frame{flex:1;border:none;background:var(--bg);width:100%;height:100%;min-height:0;border-radius:var(--radius);}

/* ══ RESPONSIVE ══ */

/* Hide page-ctx on medium and small screens */
@media(max-width:900px){
  .tb-page-ctx{display:none;}
}
/* Hide app name zone on small screens */
@media(max-width:720px){
  .tb-app{display:none;}
  #sub-bar{
    position:fixed;
    left:var(--icon-bar-w);top:var(--topbar-h);
    height:calc(100vh - var(--topbar-h));
    z-index:150;box-shadow:var(--shadow-lg);
  }
}
@media(max-width:520px){
  :root{--icon-bar-w:44px;--topbar-h:44px;}
  .tb-vsep{display:none;}
  .tb-uname,.tb-urole{display:none;}
  .tb-user{padding:0 7px;}
  .tb-sc span{display:none;}
  /* Make shortcuts compact icon-only */
  .tb-sc{padding:0 7px;gap:0;}
}

/* ══ CACHE STATUS BUTTON ══ */
.tb-cache-btn{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  width:32px;height:28px;
  border-radius:6px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;font-family:var(--font);transition:all .15s;flex-shrink:0;
}
.tb-cache-btn i{font-size:14px;}
.tb-cache-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.tb-cache-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(88,166,255,.3);}
/* signal dot — bottom-right corner of the icon button */
.tb-cache-btn .cache-dot{
  position:absolute;bottom:4px;right:4px;
  width:6px;height:6px;border-radius:50%;
  background:var(--teal);
  box-shadow:0 0 4px rgba(57,211,83,.7);
  border:1px solid var(--bg2);
}
.tb-cache-btn .cache-dot.stale{background:var(--amber);box-shadow:0 0 4px rgba(227,179,65,.7);}
.tb-cache-btn .cache-dot.error{background:var(--red);box-shadow:0 0 4px rgba(248,81,73,.7);}

/* ══ CACHE PANEL ══ */
.cache-panel{
  position:fixed;
  top:calc(var(--topbar-h) + 8px);
  right:clamp(8px, 2vw, 120px);
  width:min(480px, calc(100vw - 16px));
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:10px;
  box-shadow:0 10px 36px rgba(0,0,0,.6),0 2px 6px rgba(0,0,0,.3);
  z-index:99998;
  display:none;
  overflow:hidden;
  animation:cpIn .18s ease;
  flex-direction:column;
}
.cache-panel.open{display:flex;}
.cp-scroll{overflow:hidden;flex:1;}
@keyframes cpIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* Mobile: centered sheet at top, 80% wide */
@media(max-width:600px){
  .cache-panel{
    top:calc(var(--topbar-h) + 10px);
    bottom:auto;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:80%;
    max-width:none;
    border-radius:10px;
    animation:cpInMob .2s ease;
  }
  @keyframes cpInMob{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
}

.cp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 7px;
  border-bottom:1px solid var(--border);
}
.cp-title{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;font-weight:700;color:var(--text);
}
.cp-title i{font-size:14px;color:var(--accent);}
.cp-actions{display:flex;align-items:center;gap:5px;}
.cp-action-btn{
  display:flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:5px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-size:10px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all .15s;
}
.cp-action-btn:hover{color:var(--text);border-color:var(--border2);}
.cp-action-btn.danger:hover{color:var(--red);border-color:rgba(248,81,73,.4);background:var(--red-dim);}
.cp-action-btn i{font-size:11px;}

/* Table */
.cp-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cp-table .cp-col-hdr th{
  font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text3);padding:4px 8px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--bg3);
}
.cp-table .cp-col-hdr th:last-child{text-align:center;}
.cp-table td{
  padding:6px 8px;font-size:10.5px;color:var(--text2);
  border-bottom:1px solid var(--border);vertical-align:middle;
}
.cp-table tr:last-child td{border-bottom:none;}
.cp-table tr:hover td{background:var(--surface2);}

/* Stacked cell layout — top line bold, bottom line muted */
.cp-cell-top{
  font-size:11px;line-height:1.3;
}
.cp-cell-bot{
  font-size:9.5px;line-height:1.3;margin-top:2px;
  display:flex;align-items:center;
}

/* Dataset name */
.cp-ds-name{
  display:flex;align-items:center;gap:6px;
  font-weight:600;color:var(--text);font-size:11px;min-width:0;
}
.cp-ds-name-text{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
}
.cp-ds-icon{
  width:20px;height:20px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;
}

/* Status pill */
.cp-status-pill{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 6px;border-radius:20px;
  font-size:9.5px;font-weight:700;letter-spacing:.03em;
}
.cp-status-pill.fresh{background:var(--teal-dim);color:var(--teal);}
.cp-status-pill.stale{background:var(--amber-dim);color:var(--amber);}
.cp-status-pill.empty{background:var(--surface2);color:var(--text3);}
.cp-status-pill i{font-size:9.5px;}

/* TTL bar (inline in remaining line) */
.cp-ttl-fill.fresh{background:var(--teal);}
.cp-ttl-fill.mid  {background:var(--amber);}
.cp-ttl-fill.low  {background:var(--red);}

/* Action buttons */
.cp-row-btns{display:flex;align-items:center;justify-content:center;gap:3px;}
.cp-row-btn{
  width:22px;height:22px;border-radius:5px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.cp-row-btn:hover.refresh{color:var(--accent);border-color:rgba(88,166,255,.4);background:var(--accent-dim);}
.cp-row-btn:hover.delete {color:var(--red);border-color:rgba(248,81,73,.4);background:var(--red-dim);}
.cp-row-btn.spin i{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.cp-footer{
  padding:6px 12px;background:var(--bg3);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:9.5px;color:var(--text3);
}
.cp-footer-note{display:flex;align-items:center;gap:4px;}
.cp-footer-note i{font-size:10px;}

/* ══ CACHE MISS CHECKER PANEL ══ */
.cm-panel{
  position:fixed;bottom:14px;right:14px;
  width:320px;max-height:260px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  z-index:9000;
  display:none;flex-direction:column;overflow:hidden;
  font-family:var(--font);
}
.cm-panel.open{display:flex;}
.cm-header{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;background:var(--bg3);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.cm-title{font-size:11px;font-weight:700;color:var(--text);flex:1;display:flex;align-items:center;gap:6px;}
.cm-title i{color:var(--amber);font-size:13px;}
.cm-close{width:20px;height:20px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;}
.cm-close:hover{background:var(--surface2);color:var(--text);}
.cm-body{flex:1;overflow-y:auto;padding:8px;scrollbar-width:none;}
.cm-body::-webkit-scrollbar{display:none;}
.cm-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:var(--radius);margin-bottom:3px;
  font-size:11px;background:var(--bg2);border:1px solid var(--border);
}
.cm-row.miss{border-color:rgba(248,81,73,.3);background:var(--red-dim);}
.cm-row.error{border-color:rgba(248,81,73,.5);background:var(--red-dim);}
.cm-row.ok{border-color:rgba(57,211,83,.25);background:var(--teal-dim);}
.cm-row-name{flex:1;color:var(--text);font-weight:600;}
.cm-row-info{color:var(--text3);font-size:10px;}
.cm-row-badge{
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;
  text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;
}
.cm-row-badge.miss{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.cm-row-badge.error{background:var(--red-dim);color:var(--red);}
.cm-row-badge.ok{background:var(--teal-dim);color:var(--teal);}
.cm-row-badge.stale{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(227,179,65,.3);}
.cm-row-btn{
  width:22px;height:22px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;padding:0;flex-shrink:0;
}
.cm-row-btn:hover{color:var(--accent);border-color:rgba(88,166,255,.4);background:var(--accent-dim);}
.cm-row-btn.spin i{animation:spin 1s linear infinite;}
.cm-footer-strip{
  padding:7px 12px;background:var(--bg3);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;color:var(--text3);flex-shrink:0;
}
.cm-footer-strip button{
  font-size:10px;padding:3px 8px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;gap:4px;transition:all .15s;
}
.cm-footer-strip button:hover{color:var(--accent);border-color:rgba(88,166,255,.3);}
/* miss badge on cache btn */
.cache-miss-badge{
  position:absolute;top:-4px;right:-4px;
  min-width:14px;height:14px;border-radius:7px;
  background:var(--red);color:#fff;
  font-size:8px;font-weight:700;font-family:var(--font);
  display:none;align-items:center;justify-content:center;
  padding:0 3px;border:1.5px solid var(--bg2);
}
.cache-miss-badge.show{display:flex;}

/* ══ AP2 Virtual-Scroll container ══
   Attach class ap2-vs-wrap to any scrollable table host.
   Height = VS_ROWS (20) × ROW_H (36px) = 720px max;
   overflows scroll automatically.                        */
.ap2-vs-wrap{
  overflow-y:auto;
  max-height:720px;         /* 20 × 36px */
  contain:strict;           /* GPU compositing hint */
  will-change:scroll-position;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.ap2-vs-wrap::-webkit-scrollbar{width:5px;}
.ap2-vs-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.ap2-vs-row{ height:36px; }  /* fixed row height for virtual-scroll math */

/* ══ IDB status badge in cache panel footer ══ */
.cp-idb-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:.04em;
  background:var(--accent-dim);color:var(--accent);
  border:1px solid rgba(88,166,255,.25);
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">

    <!-- Truck = sidebar toggle -->
    <div class="tb-brand">
      <button class="tb-brand-icon" onclick="toggleSidebar()" title="Toggle sidebar">
        <i class="ti ti-truck"></i>
      </button>
    </div>

    <!-- App name + day/night toggle icon -->
    <div class="tb-app" id="tb-app-zone">
      <div style="min-width:0;">
        <div class="tb-app-name">FleetFlow Pro</div>
        <div class="tb-app-sub">HR &amp; Fleet Management</div>
      </div>
      <!-- Day/Night pill toggle — icon only -->
      <button class="tb-daynight" id="daynight-btn"
        onclick="quickToggleDarkLight()"
        title="Toggle dark / light mode">
        <i class="ti ti-moon" id="daynight-icon"></i>
      </button>
    </div>

    <!-- Main strip -->
    <div class="tb-strip">

      <!-- Page context (hides on small screens) -->
      <div class="tb-page-ctx">
        <div class="tb-page-pill" id="tb-pill" style="background:var(--accent-dim);color:var(--accent);">
          <i class="ti ti-users" id="tb-pill-i"></i>
        </div>
        <div>
          <div class="tb-page-label" id="tb-page-label">Employees</div>
          <div class="tb-page-sub2" id="tb-page-sub2">Staff directory</div>
        </div>
      </div>

      <!-- Shortcuts — always visible, scrollable -->
      <div class="tb-shortcuts">
        <button class="tb-sc emp"
          onclick="loadPage('Reg/addEmp.html',null,'Add Employee','ti-user-plus','Register new employee','var(--accent-dim)','var(--accent)')">
          <i class="ti ti-user-plus"></i><span> Add Employee</span>
        </button>
        <button class="tb-sc bike"
          onclick="loadPage('Reg/addBike.html',null,'Add Bike','ti-motorbike','Register vehicle','var(--teal-dim)','var(--teal)')">
          <i class="ti ti-motorbike"></i><span> Add Bike</span>
        </button>
        <button class="tb-sc sim"
          onclick="loadPage('Reg/addSim.html',null,'Add Sim','ti-device-sim','New sim','var(--amber-dim)','var(--amber)')">
          <i class="ti ti-device-sim"></i><span> Add Sim</span>
        </button>
        <button class="tb-sc doc"
          onclick="loadPage('Reg/docPortal.html',null,'Add Documents','ti-file-plus','Upload new document','var(--red-dim)','var(--red)')">
          <i class="ti ti-file-plus"></i><span> Add Doc</span>
        </button>
      </div>

      <div class="tb-gap"></div>

      <!-- Cache Status Button — icon + signal dot only -->
      <button class="tb-cache-btn" id="cache-status-btn" onclick="toggleCachePanel(event)" title="Cache Status">
        <i class="ti ti-database"></i>
        <span class="cache-dot" id="cache-health-dot"></span>
        <span class="cache-miss-badge" id="cache-miss-badge"></span>
      </button>

      <div class="tb-vsep"></div>

      <!-- Theme dropdown — position:fixed dropdown -->
      <div class="theme-dd-wrap" id="theme-dd-wrap">
        <button class="tb-theme-btn" id="theme-dd-btn" onclick="toggleThemeDropdown(event)" title="Choose theme">
          <i class="ti ti-palette icon-main" id="theme-dd-icon"></i>
          <span id="theme-dd-label">Dark</span>
          <i class="ti ti-chevron-down caret"></i>
        </button>
        <!-- Dropdown rendered here but positioned fixed via JS -->
        <div class="theme-dropdown" id="theme-dropdown" role="menu">
          <div class="td-label">Choose Theme</div>
          <button class="td-item" data-t="dark"   onclick="setTheme('dark')">
            <span class="td-swatch" style="background:#161b22;border-color:#30363d;"></span>
            <i class="ti ti-moon"></i>Dark
          </button>
          <button class="td-item" data-t="light"  onclick="setTheme('light')">
            <span class="td-swatch" style="background:#f0f2f5;border-color:#c8d0d9;"></span>
            <i class="ti ti-sun"></i>Light
          </button>
          <button class="td-item" data-t="purple" onclick="setTheme('purple')">
            <span class="td-swatch" style="background:#17112e;border-color:#3a2e5e;"></span>
            <i class="ti ti-star"></i>Purple Night
          </button>
          <button class="td-item" data-t="ocean"  onclick="setTheme('ocean')">
            <span class="td-swatch" style="background:#0d2035;border-color:#1e4a72;"></span>
            <i class="ti ti-waves"></i>Ocean
          </button>
          <button class="td-item" data-t="slate"  onclick="setTheme('slate')">
            <span class="td-swatch" style="background:#1a1f28;border-color:#3a4556;"></span>
            <i class="ti ti-layout-grid"></i>Slate
          </button>
        </div>
      </div>

      <div class="tb-vsep"></div>

      <!-- User -->
      <div class="tb-user" id="tb-user-chip" title="Loading...">
        <div class="tb-avatar" id="tb-avatar">--</div>
        <div>
          <div class="tb-uname" id="tb-uname">Loading...</div>
          <div class="tb-urole" id="tb-urole">Please wait</div>
        </div>
      </div>

    </div>
  </header>

  <!-- BODY ROW -->
  <div class="body-row" id="body-row">

    <!-- ICON BAR — never hides, always scrollable -->
    <nav id="icon-bar" aria-label="Navigation">
      <div class="ib-divider"></div>
      <button class="ib-btn active" id="ib-emp" onclick="ibOpen('ib-emp',this)" title="Employees">
        <i class="ti ti-users"></i><span class="ib-tip">Employees</span>
      </button>
      <button class="ib-btn" id="ib-bike" onclick="ibOpen('ib-bike',this)" title="Bike Fleet">
        <i class="ti ti-motorbike"></i><span class="ib-tip">Bike Fleet</span>
      </button>
      <button class="ib-btn" id="ib-sim" onclick="ibOpen('ib-sim',this)" title="SIM Cards">
       <i class="ti ti-device-sim"></i><span class="ib-tip">SIM Cards</span>
		

      </button>
      <button class="ib-btn" id="ib-adv" onclick="ibOpen('ib-adv',this)" title="Advance Salary">
        <i class="ti ti-cash"></i><span class="ib-tip">Advance Salary</span>
      </button>
      <button class="ib-btn" id="ib-docs" onclick="ibOpen('ib-docs',this)" title="Document">
        <i class="ti ti-file-description"></i><span class="ib-tip">Document</span>
      </button>
      <div class="ib-spacer"></div>
    </nav>

    <!-- SUB BAR -->
    <div id="sub-bar">
      <div class="sb2-header">
        <i class="ti ti-users" id="sb2-icon"></i>
        <span id="sb2-title">Employees</span>
      </div>
      <div class="sb2-nav" id="sb2-nav"></div>
    </div>

    <!-- MAIN AREA — 5px margin container -->
    <div class="main-area">
      <div class="main-container">
        <iframe id="main-frame" src="Reg/allEmp.html" title="Content"></iframe>
      </div>
    </div>

  </div>
</div>

<!-- ══ CACHE STATUS PANEL ══ -->
<div class="cache-panel" id="cache-panel">
  <div class="cp-header">
    <div class="cp-title">
      <i class="ti ti-database"></i>
      Cache Status
    </div>
    <div class="cp-actions">
      <button class="cp-action-btn" onclick="toggleMissChecker()" title="Cache miss checker" style="color:var(--amber);">
        <i class="ti ti-alert-triangle"></i> Checker
      </button>
      <button class="cp-action-btn" onclick="refreshAllCache()" title="Hard refresh all datasets">
        <i class="ti ti-refresh"></i> Refresh All
      </button>
      <button class="cp-action-btn danger" onclick="deleteAllCache()" title="Clear entire cache">
        <i class="ti ti-trash"></i> Clear All
      </button>
    </div>
  </div>
  <div class="cp-scroll">
  <table class="cp-table">
    <colgroup>
      <col style="width:36%"/>
      <col style="width:22%"/>
      <col style="width:28%"/>
      <col style="width:14%"/>
    </colgroup>
    <thead>
      <tr class="cp-col-hdr">
        <th>Dataset</th>
        <th class="cp-col-sync">Last Sync / TTL</th>
        <th class="cp-col-status-rem">Status / Remaining</th>
        <th style="text-align:center;">Actions</th>
      </tr>
    </thead>
    <tbody id="cache-table-body">
      <tr><td colspan="4" style="text-align:center;color:var(--text3);padding:20px;">Loading cache info…</td></tr>
    </tbody>
  </table>

<div class="cm-panel" id="cm-panel">

<script>


/* ════════════════════════════════════════════
   EVENT LOG — silent sink (monitor removed)
   ════════════════════════════════════════════ */
function _logEvent() {} // no-op; kept so cache functions compile without change

/* ════════════════════════════════════════════
   CACHE MISS CHECKER
   ════════════════════════════════════════════ */
let _cmPanelOpen = false;
let _cmAutoHideTimer = null;

function toggleMissChecker() {
  _cmPanelOpen = !_cmPanelOpen;
  const p = document.getElementById('cm-panel');
  if (_cmPanelOpen) {
    p.classList.add('open');
    cmScanAll();
    p.removeEventListener('mouseleave', _onCmLeave);
    p.removeEventListener('mouseenter', _onCmEnter);
    p.addEventListener('mouseleave', _onCmLeave);
    p.addEventListener('mouseenter', _onCmEnter);
    _resetCmAutoHide();
  } else {
    closeMissPanel();
  }
}

function _onCmLeave()  { _resetCmAutoHide(); }
function _onCmEnter()  { if (_cmAutoHideTimer) { clearTimeout(_cmAutoHideTimer); _cmAutoHideTimer = null; } }

function closeMissPanel() {
  _cmPanelOpen = false;
  const p = document.getElementById('cm-panel');
  p?.classList.remove('open');
  p?.removeEventListener('mouseleave', _onCmLeave);
  p?.removeEventListener('mouseenter', _onCmEnter);
  if (_cmAutoHideTimer) { clearTimeout(_cmAutoHideTimer); _cmAutoHideTimer = null; }
}

function _resetCmAutoHide() {
  if (_cmAutoHideTimer) clearTimeout(_cmAutoHideTimer);
  _cmAutoHideTimer = setTimeout(closeMissPanel, 3000);
}

function cmScanAll() {
  const body = document.getElementById('cm-body');
  const summary = document.getElementById('cm-summary');
  const lastScan = document.getElementById('cm-last-scan');
  if (!body) return;

  const now = new Date();
  if (lastScan) lastScan.textContent = 'Scanned ' + now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  const results = Object.entries(DS_META).map(([key, meta]) => {
    const ageMs = getCacheAge(key);
    const hasData = (() => { try { const d = getCacheData(key); return Array.isArray(d) ? d.length > 0 : d != null; } catch(_){ return false; } })();
    const fresh = ageMs < meta.ttlMs;
    const status = !hasData ? 'miss' : !fresh ? 'stale' : 'ok';
    return { key, label: meta.label, status, meta, ageMs };
  });

  const misses = results.filter(r => r.status === 'miss').length;
  const stales = results.filter(r => r.status === 'stale').length;
  if (summary) {
    if (misses === 0 && stales === 0) summary.textContent = 'All ' + results.length + ' healthy';
    else summary.textContent = (misses ? misses + ' miss' : '') + (misses && stales ? ', ' : '') + (stales ? stales + ' stale' : '');
  }

  const missTotal = misses + stales;
  const badge = document.getElementById('cache-miss-badge');
  if (badge) {
    badge.textContent = missTotal || '';
    badge.classList.toggle('show', missTotal > 0);
  }

  // Only update visible rows when panel is open
  if (!_cmPanelOpen) {
    if (_cmPanelOpen) _resetCmAutoHide();
    return;
  }

  body.innerHTML = results.map(r => {
    const badgeCls = r.status === 'miss' ? 'miss' : r.status === 'stale' ? 'stale' : 'ok';
    const badgeTxt = r.status === 'miss' ? 'MISS' : r.status === 'stale' ? 'STALE' : 'OK';
    const ageStr = r.ageMs === Infinity ? 'Never loaded' : r.ageMs < 60000 ? Math.floor(r.ageMs/1000)+'s ago' : Math.floor(r.ageMs/60000)+'m ago';
    return `<div class="cm-row ${r.status !== 'ok' ? r.status : ''}">
      <span class="cm-row-name">${r.label}</span>
      <span class="cm-row-info">${ageStr}</span>
      <span class="cm-row-badge ${badgeCls}">${badgeTxt}</span>
      <button class="cm-row-btn" id="cmbtn-${r.key}" onclick="cmRefresh('${r.key}',this)" title="Force refresh">
        <i class="ti ti-refresh"></i>
      </button>
    </div>`;
  }).join('');

  if (_cmPanelOpen) _resetCmAutoHide();
}

async function cmRefresh(key, btn) {
  btn.classList.add('spin');
  btn.disabled = true;
  _logEvent('refresh', 'Cache refresh triggered:', key);
  try {
    if (window.AdminPro && AdminPro.forceRefresh) {
      await AdminPro.forceRefresh(key);
    } else {
      await AP2Cache.delete(key);
    }
    setTimeout(() => { cmScanAll(); renderCacheTable(); updateCacheHealthDot(); _notifyFrame(); }, 300);
  } catch(e) {
    _logEvent('miss', 'Refresh error:', key);
  } finally {
    btn.classList.remove('spin');
    btn.disabled = false;
  }
}

/* ══ CACHE CHANGE WATCHER ══ */
(function _watchCache() {
  AP2Cache.onChange(async (key, op) => {
    if (op === 'set') {
      const rec = await AP2Cache.get(key).catch(() => null);
      if (rec) {
        window._AP2Shadow.age.set(key, rec.ts);
        window._AP2Shadow.data.set(key, rec.data);
      }
      _logEvent('cache', 'Cache updated:', key);
    } else if (op === 'delete') {
      window._AP2Shadow.age.delete(key);
      window._AP2Shadow.data.delete(key);
      _logEvent('delete', 'Cache deleted:', key);
    } else if (op === 'clear') {
      window._AP2Shadow.age.clear();
      window._AP2Shadow.data.clear();
      _logEvent('delete', 'ALL cache cleared', '');
    }
    updateCacheHealthDot();
    if (_cmPanelOpen) cmScanAll();
  });
})();


/* ══ SECTION MAP ══

        { label:'Bike Docs',     file:'Reg/bikExp.html', icon:'ti-motorbike', sub:'Mulkiya · Insurance',  badge:true, permKey:'ap2_bike'     },

let activeSection = null;

let sidebarVisible = true;

/* The Permissions sheet/session stores each granted dataset as an info
   object (e.g. { label, apiKey, paramKey, ttlMs }), not a boolean — a key
   is "permitted" simply by being present (and not explicitly disabled). */
function _hasPerm(perms, key) {
  return !!(perms && perms[key]);
}

/* ══ PERMISSIONS — show/hide nav buttons based on Permissions sheet ══
   Called once on load (after Auth.getPermissions() is available) and
   again if permissions are refreshed during the session.

   Logic:
   • If getPermissions() returns null → no perms fetched yet → hide ALL
     permKey sections with a "loading…" state until perms arrive.
   • For each SECTIONS entry with a permKey, show/hide the matching
     icon-bar button and topbar shortcut.
   • Sections with permKey:null are always visible.
   • If the first permitted section isn't 'ib-emp', auto-open it.         */
function _applyPermissions() {
  const perms = window.Auth && window.Auth.getPermissions
    ? window.Auth.getPermissions()
    : null;

  let firstAllowed = null;

  for (const [id, sec] of Object.entries(SECTIONS)) {
    const btn = document.getElementById(id);
    if (!btn) continue;

    let allowed;


    if (sec.permKey === null) {
      // Section has no own gate — check if at least one sub-item is permitted
      allowed = sec.groups.some(g =>
        g.items.some(item =>
          !item.permKey || _hasPerm(perms, item.permKey)
        )
      );
    } else {
      allowed = !sec.permKey || _hasPerm(perms, sec.permKey);
    }


	  

    btn.style.display = allowed ? '' : 'none';
    if (allowed && !firstAllowed) firstAllowed = id;
  }

  // Also hide topbar shortcuts that are permission-gated
  const shortcutGates = [
    { sel: '.tb-sc.emp',  permKey: 'ap2_employee' },
    { sel: '.tb-sc.bike', permKey: 'ap2_bike'     },
    { sel: '.tb-sc.adv',  permKey: 'ap2_master'   },
  ];
  for (const { sel, permKey } of shortcutGates) {
    document.querySelectorAll(sel).forEach(el => {
      el.style.display = (!perms || _hasPerm(perms, permKey)) ? '' : 'none';
    });
  }

  console.log('[Permissions] applied — firstAllowed:', firstAllowed, '| perms:', perms);
  return firstAllowed;
}

/* ── Sidebar toggle ── */
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  const ib = document.getElementById('icon-bar');
  const sb = document.getElementById('sub-bar');
  const appZone = document.getElementById('tb-app-zone');
  if (sidebarVisible) {
    ib.style.display = '';
    sb.style.display = '';
    appZone.classList.remove('collapsed');
  } else {
    ib.style.display = 'none';
    sb.style.display = 'none';
    appZone.classList.add('collapsed');
  }
}

/* ── Open icon section ── */
function ibOpen(id, btn) {
  const sec = SECTIONS[id];
  if (!sec) return;
  const sb = document.getElementById('sub-bar');
  if (subHideTimer) { clearTimeout(subHideTimer); subHideTimer = null; }
  sb.classList.remove('subitems-hiding');

  if (activeSection === id && subOpen) {
    subOpen = false; sb.classList.add('collapsed'); return;
  }

  document.querySelectorAll('.ib-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  document.getElementById('sb2-icon').className = 'ti ' + sec.icon;
  document.getElementById('sb2-title').textContent = sec.label;

  const perms = window.Auth && window.Auth.getPermissions ? window.Auth.getPermissions() : null;

  const nav = document.getElementById('sb2-nav');
  nav.innerHTML = sec.groups.map(g => {
    const visibleItems = g.items.filter(item =>
      !item.permKey || _hasPerm(perms, item.permKey)
    );
    if (!visibleItems.length) return '';
    return `
      <div class="sb2-section">${g.label}</div>
      ${visibleItems.map(item => `
        <div class="sb2-item" onclick="loadPage('${item.file}',this,'${item.label}','${item.icon||sec.icon}','${item.sub}','${sec.pillBg.replace(/'/g,'"')}','${sec.pillColor}')">
          <i class="ti ${item.icon}"></i>${item.label}
          ${item.badge ? '<span class="sb2-badge">!</span>' : ''}
        </div>`).join('')}
    `;
  }).join('');

  setCtx(sec.pageLabel, sec.pageSub, sec.pillBg, sec.pillColor, sec.pillIcon);
  subOpen = true;
  sb.classList.remove('collapsed');
  activeSection = id;
  startSubHideTimer();

  // Auto-load the first item of the first group into the main frame
  // This ensures data is visible immediately without a manual click
  const firstGroup = sec.groups && sec.groups[0];
  const firstItem  = firstGroup && firstGroup.items && firstGroup.items[0];
  if (firstItem) {
    const frame = document.getElementById('main-frame');
    if (frame && !frame.src.endsWith(firstItem.file)) {
      // Mark first nav item as active
      setTimeout(() => {
        const firstNavEl = document.querySelector('#sb2-nav .sb2-item');
        if (firstNavEl) firstNavEl.classList.add('active');
      }, 0);
      loadPage(firstItem.file, null, firstItem.label, firstItem.icon || sec.icon, firstItem.sub,
               sec.pillBg, sec.pillColor);
    }
  }
}

/* ── Load page ── */
function loadPage(file, el, label, icon, sub, pillBg, pillColor) {
  if (subHideTimer) { clearTimeout(subHideTimer); subHideTimer = null; }
  const sb = document.getElementById('sub-bar');
  sb.classList.remove('subitems-hiding');

  const frame = document.getElementById('main-frame');
  document.querySelectorAll('.sb2-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  if (!frame.src.endsWith(file)) frame.src = file;
  if (label) setCtx(label, sub||'', pillBg||'var(--accent-dim)', pillColor||'var(--accent)', icon||'ti-circle');
  startSubHideTimer();
}

function startSubHideTimer() {
  if (subHideTimer) clearTimeout(subHideTimer);
  subHideTimer = setTimeout(() => {
    const sb = document.getElementById('sub-bar');
    sb.classList.add('subitems-hiding');
    setTimeout(() => {
      sb.classList.add('collapsed');
      sb.classList.remove('subitems-hiding');
      subOpen = false;
    }, 450);
  }, 15000);
}

/* ── Page context ── */
function setCtx(label, sub, bg, color, iconCls) {
  const pill  = document.getElementById('tb-pill');
  const pillI = document.getElementById('tb-pill-i');
  const lbl   = document.getElementById('tb-page-label');
  const s     = document.getElementById('tb-page-sub2');
  if (pill)  { pill.style.background = bg; pill.style.color = color; }
  if (pillI) pillI.className = 'ti ' + iconCls;
  if (lbl)   lbl.textContent = label;
  if (s)     s.textContent   = sub;
}

/* ══ THEME SYSTEM ══ */
const THEMES = {
  dark:   { label:'Dark',         icon:'ti-palette' },
  light:  { label:'Light',        icon:'ti-palette' },
  purple: { label:'Purple Night', icon:'ti-palette' },
  ocean:  { label:'Ocean',        icon:'ti-palette' },
  slate:  { label:'Slate',        icon:'ti-palette' },
};

function setTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
  // Store theme preference
  _idbSetTheme(mode);

  // Update label
  const labelMap = { dark:'Dark', light:'Light', purple:'Purple Night', ocean:'Ocean', slate:'Slate' };
  const lbl = document.getElementById('theme-dd-label');
  if (lbl) lbl.textContent = labelMap[mode] || mode;

  // Mark active
  document.querySelectorAll('.td-item').forEach(el => el.classList.toggle('active', el.dataset.t === mode));

  // Update day/night icon
  updateDayNightIcon(mode);

  // ── Instant theme push to child iframe ──
  // 1. postMessage — direct, zero-delay
  _pushThemeToFrame(mode);

  // 2. BroadcastChannel — picks up other tabs/windows
  try {
    const bc = new BroadcastChannel('ap-theme');
    bc.postMessage({ type: 'ap-theme', theme: mode });
    bc.close();
  } catch(_) {}

  _logEvent('theme', 'Theme changed:', labelMap[mode] || mode);
  closeThemeDropdown();
}

/* Push theme to the child iframe immediately */
function _pushThemeToFrame(mode) {
  try {
    const frame = document.getElementById('main-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'ap-theme', theme: mode }, '*');
    }
  } catch(_) {}
}

function updateDayNightIcon(mode) {
  const icon  = document.getElementById('daynight-icon');
  if (!icon) return;
  const map = {
    light : { cls:'ti ti-sun'          },
    dark  : { cls:'ti ti-moon'         },
    purple: { cls:'ti ti-sparkles'     },
    ocean : { cls:'ti ti-wave-sine'    },
    slate : { cls:'ti ti-layout-grid'  },
  };
  const cfg = map[mode] || map.dark;
  icon.className = cfg.cls;
}

/* Quick dark ↔ light toggle via the icon button */
function quickToggleDarkLight() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  setTheme(cur === 'light' ? 'dark' : 'light');
}

/* Theme dropdown — position:fixed, computed from button bounds */
function toggleThemeDropdown(e) {
  e.stopPropagation();
  const dd  = document.getElementById('theme-dropdown');
  const btn = document.getElementById('theme-dd-btn');
  const isOpen = dd.classList.contains('open');
  if (isOpen) {
    closeThemeDropdown();
  } else {
    // Compute position from button's bounding rect
    const rect = btn.getBoundingClientRect();
    const ddW  = 180; // approx dropdown width
    let left = rect.right - ddW;
    if (left < 6) left = 6;
    dd.style.top  = (rect.bottom + 6) + 'px';
    dd.style.left = left + 'px';
    dd.style.right = 'auto';
    dd.classList.add('open');
    btn.classList.add('open');
    // Close on next outside click
    setTimeout(() => document.addEventListener('click', outsideClose, { once: true }), 0);
  }
}

function outsideClose(e) {
  const dd  = document.getElementById('theme-dropdown');
  const btn = document.getElementById('theme-dd-btn');
  if (dd && !dd.contains(e.target) && btn && !btn.contains(e.target)) {
    closeThemeDropdown();
  }
}

function closeThemeDropdown() {
  document.getElementById('theme-dropdown')?.classList.remove('open');
  document.getElementById('theme-dd-btn')?.classList.remove('open');
}

/* ── Clock — HH:MM only ── */
(function tick() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const t = document.getElementById('tb-time');
  if (t) t.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  setTimeout(tick, 5000); // update every 5s is enough for HH:MM

/* ══ SESSION GUARD ══
   auth.js (loaded in <head>) already runs _boot() on DOMContentLoaded
   and redirects to login.html if the session is invalid or expired.
   This guard is a secondary safety net in case auth.js failed to load. */
(function sessionGuard() {
  try {
    // If auth.js loaded correctly, it already handled the guard — trust it.
    if (window.Auth && typeof window.Auth.getCredentials === 'function') {
      // auth.js is present — it will have already redirected if invalid.
      // We don't double-redirect here.
      return;
    }
    // auth.js didn't load (CDN failure?) — fall back to old key check
    const raw = sessionStorage.getItem('ap_session');
    if (!raw) {
      console.warn('[index] auth.js not loaded and no session found — redirecting');
      window.location.replace('https://effimalik.github.io/Test/login.html');
      return;
    }
    const s = JSON.parse(raw);
    if (!s || !s.sessionId || !s.token || !s.email) {
      window.location.replace('https://effimalik.github.io/Test/login.html');
    }
  } catch (e) {
    console.error('[sessionGuard] Error — redirecting to be safe:', e);
    window.location.replace('https://effimalik.github.io/Test/login.html');
  }
})();

/* ── Sign out — delegates to Auth.signOut() which handles server + client ── */
function signOut() {
  if (window.Auth && typeof window.Auth.signOut === 'function') {
    window.Auth.signOut();
  } else {
    // Fallback if auth.js failed to load
    sessionStorage.removeItem('ap_session');
    window.location.replace('https://effimalik.github.io/Test/login.html');
  }
}

/* ── Populate user chip — auth.js does this automatically,
   but this is called again on DOMContentLoaded for safety ── */
function populateUserChip() {
  try {
    // Prefer auth.js getUser() — it reads from the correct session key
    if (window.Auth && typeof window.Auth.getUser === 'function') {
      const u = window.Auth.getUser();
      if (!u || !u.email) return;

      const avatarEl = document.getElementById('tb-avatar');
      const nameEl   = document.getElementById('tb-uname');
      const roleEl   = document.getElementById('tb-urole');
      const chip     = document.getElementById('tb-user-chip');

      if (avatarEl) avatarEl.textContent = u.initials || '--';
      if (nameEl)   nameEl.textContent   = u.name     || u.email;
      if (roleEl)   roleEl.textContent   = u.role     || 'User';
      if (chip) {
        chip.title   = `Signed in as ${u.email}\nClick to sign out`;
        chip.onclick = () => { if (confirm(`Sign out ${u.name || u.email}?`)) window.Auth.signOut(); };
        chip.style.cursor = 'pointer';
      }
    }
  } catch (e) { console.error('[populateUserChip]:', e); }
}

/* ── Theme helpers — stored in sessionStorage ── */
function _idbSetTheme(mode) {
  try { sessionStorage.setItem('__ui_theme', mode); } catch(_) {}
}
async function _idbGetTheme() {
  try { return sessionStorage.getItem('__ui_theme') || null; } catch(_) { return null; }
}
/* ── Init ── */
window.addEventListener('DOMContentLoaded', () => {
  // Load saved theme; fall back to 'dark'
  const savedTheme = (() => { try { return sessionStorage.getItem('__ui_theme') || 'dark'; } catch(_) { return 'dark'; } })();
  setTheme(savedTheme);

  populateUserChip();
  updateCacheHealthDot();
  setInterval(updateCacheHealthDot, 30000);

  // ── STEP 1: Apply permissions from session immediately (instant, no network) ──
  _applyPermissions();
  _buildDsMeta();

  // ── STEP 2: Warm cache in background — do NOT await, open page immediately ──
  // warmIfEmpty() fetches from the server only if data is missing/stale.
  // We fire it without awaiting so the first permitted page opens instantly.
  // When it resolves it notifies the child frame via _notifyFrame().
  if (window.AdminPro && typeof window.AdminPro.warmIfEmpty === 'function') {
    AdminPro.warmIfEmpty()
      .then(() => {
        // Sync _AP2Shadow with what AdminPro just wrote to IDB, then push to child frame
        if (window.AdminPro && AdminPro.getActiveDatasets) {
          for (const key of Object.keys(AdminPro.getActiveDatasets())) {
            const entry = AdminPro.cache.get(key);
            if (entry && entry.data) {
              window._AP2Shadow.age.set(key, entry.ts);
              window._AP2Shadow.data.set(key, entry.data);
            }
          }
        }
        updateCacheHealthDot(); cmScanAll(); _notifyFrame();
      })
      .catch(e => console.warn('[index] warmIfEmpty error (non-fatal):', e.message));
  }

  // ── STEP 3: Open the first permitted section → loads first sub-page into frame ──
  const _openFirstAllowed = () => {
    const fv = Object.keys(SECTIONS).find(id => {
      const btn = document.getElementById(id);
      return btn && btn.style.display !== 'none';
    });
    if (fv) { activeSection = null; ibOpen(fv, document.getElementById(fv)); }
  };
  _openFirstAllowed();

  // ── STEP 4: If permissions weren't in session (edge case), fetch then re-apply ──
  if (window.Auth && typeof window.Auth.getPermissions === 'function') {
    if (!window.Auth.getPermissions()) {
      window.Auth.fetchPermissions().then(perms => {
        if (perms) {
          _applyPermissions();
          _buildDsMeta();
          if (window.AdminPro && typeof window.AdminPro.warmIfEmpty === 'function') {
            AdminPro.warmIfEmpty()
              .then(() => {
                if (window.AdminPro && AdminPro.getActiveDatasets) {
                  for (const key of Object.keys(AdminPro.getActiveDatasets())) {
                    const entry = AdminPro.cache.get(key);
                    if (entry && entry.data) {
                      window._AP2Shadow.age.set(key, entry.ts);
                      window._AP2Shadow.data.set(key, entry.data);
                    }
                  }
                }
                updateCacheHealthDot(); cmScanAll(); _notifyFrame();
              })
              .catch(() => {});
          }
          _openFirstAllowed();
        }
      }).catch(e => console.warn('[index] fetchPermissions failed:', e));
    }
  }

  // Reset sub-bar autohide timer on any activity inside sub-bar
  const sb = document.getElementById('sub-bar');
  if (sb) {
    sb.addEventListener('mousemove', () => { if (subOpen) startSubHideTimer(); });
    sb.addEventListener('touchstart', () => { if (subOpen) startSubHideTimer(); }, { passive: true });
  }

  // ── Instant data push: inject cached data into child iframe the moment it loads ──
  // This eliminates the postMessage request/reply round-trip completely.
  // Child pages check window.__AP2_PRELOAD first — if present, they render
  // immediately without sending any ap-cache-request message at all.
  const _frame = document.getElementById('main-frame');
  if (_frame) {
    _frame.addEventListener('load', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      _pushThemeToFrame(currentTheme);
      // Push all cached datasets into the child frame's window directly
      try {
        const fw = _frame.contentWindow;
        if (fw) {
          const preload = {};
          for (const [key, data] of window._AP2Shadow.data.entries()) {
            preload[key] = data;
          }
          fw.__AP2_PRELOAD = preload;
          // Also broadcast as a message so child pages that already loaded can re-use it
          fw.postMessage({ type: 'ap-cache-preload', datasets: preload }, '*');
        }
      } catch(_) {}
    });
  }

  // BroadcastChannel — listen for theme changes from other tabs/windows
  try {
    const _bc = new BroadcastChannel('ap-theme');
    _bc.onmessage = (evt) => {
      if (evt.data && evt.data.type === 'ap-theme' && evt.data.theme) {
        const cur = document.documentElement.getAttribute('data-theme');
        if (cur !== evt.data.theme) setTheme(evt.data.theme);
      }
    };
  } catch(_) {}

  // Periodic miss check (every 60s) — keeps badge updated even when panel is closed
  setInterval(() => {
    cmScanAll();
    updateCacheHealthDot();
  }, 60000);
});

/* ══ CACHE PANEL ══ */
let cachePanelOpen = false;
let cachePanelTimer = null;
let _cpAutoHideTimer = null;
let _cpOutsideHandler = null;

function _resetCpAutoHide() {
  if (_cpAutoHideTimer) clearTimeout(_cpAutoHideTimer);
  _cpAutoHideTimer = setTimeout(closeCachePanel, 3000);
}

function toggleCachePanel(e) {
  e.stopPropagation();
  cachePanelOpen = !cachePanelOpen;
  const panel = document.getElementById('cache-panel');
  const btn   = document.getElementById('cache-status-btn');
  if (cachePanelOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
    renderCacheTable();
    cmScanAll();
    // Tick every second so "remaining" counts down live
    cachePanelTimer = setInterval(renderCacheTable, 1000);
    // Autohide on leave, cancel on re-enter
    panel.removeEventListener('mouseleave', _onCpLeave);
    panel.removeEventListener('mouseenter', _onCpEnter);
    panel.addEventListener('mouseleave', _onCpLeave);
    panel.addEventListener('mouseenter', _onCpEnter);
    // Start the inactivity countdown immediately
    _resetCpAutoHide();
    // Cancel any prior outside-click handler then register a new one
    if (_cpOutsideHandler) { document.removeEventListener('click', _cpOutsideHandler); }
    _cpOutsideHandler = (ev) => closePanelOutside(ev);
    setTimeout(() => document.addEventListener('click', _cpOutsideHandler), 0);
  } else {
    closeCachePanel();
  }
}

function _onCpLeave()  { _resetCpAutoHide(); }
function _onCpEnter()  { if (_cpAutoHideTimer) { clearTimeout(_cpAutoHideTimer); _cpAutoHideTimer = null; } }

function closePanelOutside(e) {
  const panel = document.getElementById('cache-panel');
  const btn   = document.getElementById('cache-status-btn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    closeCachePanel();
  }
}

function closeCachePanel() {
  const panel = document.getElementById('cache-panel');
  document.getElementById('cache-status-btn')?.classList.remove('active');
  panel?.classList.remove('open');
  panel?.removeEventListener('mouseleave', _onCpLeave);
  panel?.removeEventListener('mouseenter', _onCpEnter);
  cachePanelOpen = false;
  if (cachePanelTimer) { clearInterval(cachePanelTimer); cachePanelTimer = null; }
  if (_cpAutoHideTimer) { clearTimeout(_cpAutoHideTimer); _cpAutoHideTimer = null; }
  if (_cpOutsideHandler) { document.removeEventListener('click', _cpOutsideHandler); _cpOutsideHandler = null; }
}

/* ── DS_META — visual display config for the cache panel.
   Icon/colour metadata keyed by dataset name.
   The active set is always driven by dataLayer.js (DATASETS),
   which is permission-filtered at runtime. This map is UI-only. */
const DS_META_ICONS = {
  bike:          { icon:'ti-motorbike',         color:'var(--teal)',   colorDim:'var(--teal-dim)'   },
  employee:      { icon:'ti-users',             color:'var(--accent)', colorDim:'var(--accent-dim)' },
  master:        { icon:'ti-table',             color:'var(--purple)', colorDim:'var(--purple-dim)' },
  cioLog:        { icon:'ti-arrows-horizontal', color:'var(--orange)', colorDim:'var(--orange-dim)' },
  approvedSheet: { icon:'ti-clipboard-check',   color:'var(--teal)',   colorDim:'var(--teal-dim)'   },
  recovery:      { icon:'ti-wallet',            color:'var(--amber)',  colorDim:'var(--amber-dim)'  },
};

/* DS_META getter — always derived from dataLayer’s active (permitted) datasets.
   All cache panel functions (cmScanAll, renderCacheTable, updateCacheHealthDot,
   cacheWatchdog) read DS_META and automatically see only what the user can access.
   No hardcoded list here — permissions drive everything.                          */
Object.defineProperty(window, 'DS_META', {
  get() {
    if (!window.AdminPro || !AdminPro.getActiveDatasets) return {};
    const active = AdminPro.getActiveDatasets();
    const result = {};
    for (const [key, ds] of Object.entries(active)) {
      const icons = DS_META_ICONS[key] || { icon:'ti-database', color:'var(--accent)', colorDim:'var(--accent-dim)' };
      result[key] = { label: ds.label, ttlMs: ds.ttlMs, ...icons };
    }
    return result;
  },
  configurable: true,
});

/* No-op stub — kept so DOMContentLoaded calls don’t throw */
function _buildDsMeta() {}

function fmtTtl(ms) {
  if (ms <= 0) return '—';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function fmtTtlLabel(ms) {
  if (ms < 60000)   return Math.floor(ms/1000) + 's';
  if (ms < 3600000) return Math.floor(ms/60000) + ' min';
  return Math.floor(ms/3600000) + ' hr';
}

/* ── _notifyFrame is defined below in cacheWatchdog section ── */

function renderCacheTable() {
  const body = document.getElementById('cache-table-body');
  const footer = document.getElementById('cp-last-check');
  if (!body) return;

  // Try to get AdminPro cache status
  let rows = [];
  try {
    if (window.AdminPro && AdminPro.getCacheStatus) {
      rows = AdminPro.getCacheStatus();
    } else {
      // Build from DS_META directly reading sessionStorage
      rows = Object.entries(DS_META).map(([key, meta]) => {
        const ageMs = getCacheAge(key);
        const ttl   = meta.ttlMs;
        const fresh = ageMs < ttl;
        let hasData = false;
        try { const d = getCacheData(key); hasData = Array.isArray(d) ? d.length > 0 : d != null; } catch(_) {}
        const ageLabel = ageMs === Infinity ? 'Not loaded'
          : ageMs < 60000 ? Math.floor(ageMs/1000) + 's ago'
          : ageMs < 3600000 ? Math.floor(ageMs/60000) + 'm ago'
          : Math.floor(ageMs/3600000) + 'h ago';
        let lastSync = null;
        if (ageMs !== Infinity) {
          const d = new Date(Date.now() - ageMs);
          lastSync = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        }
        return { key, label: meta.label, ageMs, ageLabel, fresh, hasData, lastSync, ttl };
      });
    }
  } catch(e) { console.warn('cache status error', e); }

  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:20px;">No cache data found</td></tr>';
    return;
  }

  body.innerHTML = rows.map(row => {
    const meta = DS_META[row.key] || { icon:'ti-database', color:'var(--accent)', colorDim:'var(--accent-dim)', ttlMs:300000 };
    const ttlMs = row.ttl || meta.ttlMs;
    const remaining = row.ageMs === Infinity ? 0 : Math.max(0, ttlMs - row.ageMs);
    const pct = row.ageMs === Infinity ? 0 : Math.min(100, Math.round((remaining / ttlMs) * 100));
    const barCls = pct > 50 ? 'fresh' : pct > 20 ? 'mid' : 'low';
    const remColor = pct > 50 ? 'var(--teal)' : pct > 20 ? 'var(--amber)' : 'var(--red)';
    const statusCls  = !row.hasData ? 'empty' : row.fresh ? 'fresh' : 'stale';
    const statusIcon = !row.hasData ? 'ti-minus' : row.fresh ? 'ti-circle-check' : 'ti-alert-triangle';
    const statusTxt  = !row.hasData ? 'Empty'   : row.fresh ? 'Fresh'          : 'Stale';

    // HH:MM only — strip seconds and AM/PM
    const syncDisplay = (() => {
      if (!row.lastSync) return '—';
      const t = row.lastSync.trim();
      // extract HH:MM from whatever format comes in
      const m = t.match(/(\d{1,2}:\d{2})/);
      return m ? m[1] : t;
    })();

    return `<tr>
      <td>
        <div class="cp-ds-name">
          <div class="cp-ds-icon" style="background:${meta.colorDim};color:${meta.color};">
            <i class="ti ${meta.icon}"></i>
          </div>
          <span class="cp-ds-name-text" title="${row.label || row.key}">${row.label || row.key}</span>
        </div>
      </td>
      <td class="cp-col-sync">
        <div class="cp-cell-top" style="color:${row.lastSync ? 'var(--text)' : 'var(--text3)'};font-family:var(--mono);font-weight:600;">${syncDisplay}</div>
        <div class="cp-cell-bot" style="color:var(--text3);">${fmtTtlLabel(ttlMs)}</div>
      </td>
      <td class="cp-col-status-rem">
        <div class="cp-cell-top">
          <span class="cp-status-pill ${statusCls}"><i class="ti ${statusIcon}"></i>${statusTxt}</span>
        </div>
        <div class="cp-cell-bot" style="color:${remColor};font-family:var(--mono);">
          ${row.hasData ? fmtTtl(remaining) : '—'}
          <span class="cp-ttl-bar" style="display:inline-block;vertical-align:middle;width:36px;height:3px;margin-left:4px;background:var(--bg3);border-radius:2px;overflow:hidden;">
            <span class="cp-ttl-fill ${barCls}" style="display:block;height:100%;width:${pct}%;border-radius:2px;"></span>
          </span>
        </div>
      </td>
      <td>
        <div class="cp-row-btns">
          <button class="cp-row-btn refresh" id="rbtn-${row.key}"
            onclick="hardRefreshDataset('${row.key}', this)"
            title="Hard refresh ${row.label || row.key}">
            <i class="ti ti-refresh"></i>
          </button>
          <button class="cp-row-btn delete"
            onclick="deleteCacheDataset('${row.key}', this)"
            title="Delete ${row.label || row.key} cache">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  if (footer) footer.textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

/* ══ Cache read helpers — source of truth is IndexedDB via AdminPro shadow ══ */

function getCacheAge(key) {
  if (!window.AdminPro) return Infinity;
  return AdminPro.cache.age(key);
}

function getCacheData(key) {
  if (!window.AdminPro) return null;
  const e = AdminPro.cache.get(key);
  return e ? e.data : null;
}

async function hardRefreshDataset(key, btn) {
  btn.classList.add('spin');
  btn.disabled = true;
  _logEvent('refresh', 'Hard refresh triggered:', key);
  try {
    if (window.AdminPro && AdminPro.forceRefresh) {
      await AdminPro.forceRefresh(key);
    }
    setTimeout(() => { renderCacheTable(); updateCacheHealthDot(); cmScanAll(); _notifyFrame(); }, 300);
  } catch(e) {
    console.warn('refresh failed', key, e);
    _logEvent('miss', 'Refresh error:', key);
  } finally {
    btn.classList.remove('spin');
    btn.disabled = false;
  }
}

function deleteCacheDataset(key, btn) {
  _logEvent('delete', 'Cache row deleted:', key);
  AP2Cache.delete(key).then(() => {
    window._AP2Shadow.age.delete(key);
    window._AP2Shadow.data.delete(key);
    renderCacheTable();
    updateCacheHealthDot();
    setTimeout(() => { cmScanAll(); _notifyFrame(); }, 250);
  }).catch(() => {});
}

async function refreshAllCache() {
  const btn = document.querySelector('.cp-action-btn');
  _logEvent('refresh', 'Refresh all cache triggered', '');
  if (btn) { btn.innerHTML = '<i class="ti ti-refresh" style="animation:spin 1s linear infinite;display:inline-block;"></i> Refreshing…'; btn.disabled = true; }
  try {
    if (window.AdminPro && AdminPro.warmCache) {
      await AdminPro.warmCache();
    }
    renderCacheTable();
    updateCacheHealthDot();
    cmScanAll();
    _notifyFrame();
  } finally {
    if (btn) { btn.innerHTML = '<i class="ti ti-refresh"></i> Refresh All'; btn.disabled = false; }
  }
}

function deleteAllCache() {
  if (!confirm('Clear all data? It will need to be re-loaded.')) return;
  _logEvent('delete', 'ALL cache cleared', '');
  AP2Cache.clearAll().then(() => {
    window._AP2Shadow.age.clear();
    window._AP2Shadow.data.clear();
    renderCacheTable();
    updateCacheHealthDot();
    setTimeout(() => cmScanAll(), 250);
  }).catch(() => {});
}

function updateCacheHealthDot() {
  const dot = document.getElementById('cache-health-dot');
  if (!dot) return;
  try {
    const keys = Object.keys(DS_META);
    let anyStale = false, anyEmpty = true;
    for (const k of keys) {
      const age = getCacheAge(k);
      const meta = DS_META[k];
      if (age !== Infinity) anyEmpty = false;
      if (age !== Infinity && age > meta.ttlMs) anyStale = true;
    }
    dot.className = 'cache-dot' + (anyEmpty ? ' error' : anyStale ? ' stale' : '');
  } catch(e) {}
}

/* ══ CACHE MESSAGE LISTENER ══
   Handles two message types:
   • ap-cache-request  — child asking for one dataset (fallback if preload missed)
   • ap-cache-updated  — (sent by parent) tells child to re-render with fresh data */
(function cacheWatchdog() {
  window.addEventListener('message', function(evt) {
    if (!evt.data) return;
    const frame = document.getElementById('main-frame');
    if (!frame) return;

    if (evt.data.type === 'ap-cache-request') {
      // Child is pulling a single dataset — respond immediately from shadow map
      const key  = evt.data.key;
      if (!key) return;
      const data = window._AP2Shadow.data.get(key) ?? null;
      if (frame.contentWindow)
        frame.contentWindow.postMessage({ type:'ap-cache-ready', key, data }, '*');
    }
  });
})();

/* Override _notifyFrame to also push the full preload bundle so child
   re-renders with the latest data without issuing new pull requests */
function _notifyFrame() {
  const frame = document.getElementById('main-frame');
  if (!frame || !frame.contentWindow) return;
  try {
    const preload = {};
    for (const [key, data] of window._AP2Shadow.data.entries()) {
      preload[key] = data;
    }
    frame.contentWindow.postMessage({ type: 'ap-cache-preload', datasets: preload }, '*');
  } catch(_) {}
  frame.contentWindow.postMessage({ type: 'ap-cache-updated' }, '*');
  if (window.AP2CioView) AP2CioView.buildIfStale().catch(() => {});
}
</script>
